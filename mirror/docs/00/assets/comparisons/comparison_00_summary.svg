  <rect x="240" y="434" width="100.8" height="14" class="bar-arc"/>
  <text x="336.8" y="445" text-anchor="end" class="bar-lbl">18%</text>
  <text x="228" y="480" class="row-label">OWASP SAMM</text>
  <text x="228" y="496" class="row-label" style="font-weight: normal; fill: #666;">(15 practices)</text>
  <rect x="240" y="468" width="375.2" height="14" class="bar-std"/>
  <text x="611.2" y="479" text-anchor="end" class="bar-lbl">67%</text>
  <rect x="240" y="484" width="95.2" height="14" class="bar-arc"/>
  <text x="331.2" y="495" text-anchor="end" class="bar-lbl">17%</text>
