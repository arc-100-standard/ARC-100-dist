  <text x="520.0" y="578" text-anchor="middle" class="axis">50%</text>
  <line x1="660.0" y1="110" x2="660.0" y2="560" class="gridline"/>
  <text x="660.0" y="578" text-anchor="middle" class="axis">75%</text>
  <line x1="800.0" y1="110" x2="800.0" y2="560" class="gridline"/>
  <text x="800.0" y="578" text-anchor="middle" class="axis">100%</text>
  <text x="228" y="130" class="row-label">arc42</text>
  <text x="228" y="146" class="row-label" style="font-weight: normal; fill: #666;">(12 sections)</text>
  <rect x="240" y="118" width="420.0" height="14" class="bar-std"/>
  <text x="656.0" y="129" text-anchor="end" class="bar-lbl">75%</text>
  <rect x="240" y="134" width="67.2" height="14" class="bar-arc"/>
  <text x="303.2" y="145" text-anchor="end" class="bar-lbl">12%</text>
  <text x="228" y="180" class="row-label">C4 model</text>
