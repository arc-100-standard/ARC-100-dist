  <rect x="240" y="518" width="257.6" height="14" class="bar-std"/>
  <text x="493.6" y="529" text-anchor="end" class="bar-lbl">46%</text>
  <rect x="240" y="534" width="95.2" height="14" class="bar-arc"/>
  <text x="331.2" y="545" text-anchor="end" class="bar-lbl">17%</text>
  <text x="450" y="602" text-anchor="middle" class="subtitle">Asymmetry: ARC-100 covers most narrow standards well; no single standard covers most of ARC-100.</text>
</svg>