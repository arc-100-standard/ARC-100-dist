<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .row-label { font: bold 13px -apple-system, Segoe UI, sans-serif; fill: #111; text-anchor: end; }
    .axis { font: 11px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .bar-std { fill: #1e40af; }
    .bar-arc { fill: #dc2626; }
    .bar-lbl { font: 11px -apple-system, Segoe UI, sans-serif; fill: #fff; font-weight: bold; }
    .legend { font: 12px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .gridline { stroke: #e5e7eb; stroke-width: 1; }
  </style>
  <rect x="0" y="0" width="900" height="650" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 overlap with each standard</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">Two bars per standard: blue = % of standard covered by ARC-100 &#160;|&#160; red = % of ARC-100 covered by standard</text>
  <rect x="280" y="78" width="14" height="12" class="bar-std"/>
  <text x="300" y="89" class="legend">% of standard in ARC-100</text>
  <rect x="500" y="78" width="14" height="12" class="bar-arc"/>
  <text x="520" y="89" class="legend">% of ARC-100 in standard</text>
  <line x1="240.0" y1="110" x2="240.0" y2="560" class="gridline"/>
  <text x="240.0" y="578" text-anchor="middle" class="axis">0%</text>
  <line x1="380.0" y1="110" x2="380.0" y2="560" class="gridline"/>
  <text x="380.0" y="578" text-anchor="middle" class="axis">25%</text>
