  <rect x="240" y="368" width="252.0" height="14" class="bar-std"/>
  <text x="488.0" y="379" text-anchor="end" class="bar-lbl">45%</text>
  <rect x="240" y="384" width="280.0" height="14" class="bar-arc"/>
  <text x="516.0" y="395" text-anchor="end" class="bar-lbl">50%</text>
