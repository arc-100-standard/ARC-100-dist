<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs DORA / Accelerate</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">High-performance engineering capabilities (24 capabilities)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="525" cy="240" r="88" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="670" y="85" class="std-lbl">DORA / Accelerate</text>
  <text x="670" y="102" class="count">24 capabilities</text>
  <line x1="700" y1="108" x2="587" y2="178" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">11 of 24 DORA capabilities map to ARC-100</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">46%</tspan> of DORA / Accelerate topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">17%</tspan> of ARC-100 chapters map back to DORA / Accelerate</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• API contract (Book 42)</text>
  <text x="65" y="568" class="item item-arc">• Wire shapes (Book 62)</text>
  <text x="65" y="584" class="item item-arc">• Identity / Auth (47, 65)</text>
  <text x="65" y="600" class="item item-arc">• Audit (48, 64)</text>
  <text x="65" y="616" class="item item-arc">• Compliance (94)</text>
  <text x="65" y="632" class="item item-arc">• SCA (95)</text>
  <text x="65" y="648" class="item item-arc">• Application philosophy (01)</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• Version Control (86)</text>
  <text x="370" y="568" class="item item-shared">• Trunk-Based Dev (86-03)</text>
  <text x="370" y="584" class="item item-shared">• CI (85)</text>
  <text x="370" y="600" class="item item-shared">• Deployment Automation (85, 92)</text>
  <text x="370" y="616" class="item item-shared">• Test Automation (82)</text>
  <text x="370" y="632" class="item item-shared">• Test Data Mgmt (82-05)</text>
  <text x="370" y="648" class="item item-shared">• Shift-Left Security (84, 93)</text>
  <text x="370" y="664" class="item item-shared">• Loosely Coupled Arch (40-03)</text>
  <text x="370" y="680" class="item item-shared">• Monitoring (90)</text>
  <text x="370" y="696" class="item item-shared">• Database Change Mgmt (66)</text>
  <text x="370" y="712" class="item item-shared">• Code Maintainability (81, 82)</text>
  <text x="645" y="530" class="col-h col-h-std">DORA / Accelerate unique</text>
  <text x="645" y="552" class="item item-std">• Empowered Teams</text>
  <text x="645" y="568" class="item item-std">• Customer Feedback</text>
  <text x="645" y="584" class="item item-std">• Value Stream Visibility</text>
  <text x="645" y="600" class="item item-std">• Working in Small Batches</text>
  <text x="645" y="616" class="item item-std">• Lightweight Change Approval</text>
  <text x="645" y="632" class="item item-std">• Limit WIP / Visual Mgmt</text>
  <text x="645" y="648" class="item item-std">• Westrum Org Culture</text>
  <text x="645" y="664" class="item item-std">• Job Satisfaction</text>
  <text x="645" y="680" class="item item-std">• Transformational Leadership</text>
</svg>