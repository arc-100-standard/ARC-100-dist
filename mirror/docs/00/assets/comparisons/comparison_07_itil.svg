<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs ITIL 4</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">IT service management framework (~34 practices)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="555" cy="240" r="110" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="720" y="85" class="std-lbl">ITIL 4</text>
  <text x="720" y="102" class="count">~34 practices</text>
  <line x1="750" y1="108" x2="632" y2="163" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">~9 of 34 ITIL practices have ARC-100 coverage</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">28%</tspan> of ITIL 4 topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">18%</tspan> of ARC-100 chapters map back to ITIL 4</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• API contract &amp; Wire shapes</text>
  <text x="65" y="568" class="item item-arc">• Identity / Auth detail</text>
  <text x="65" y="584" class="item item-arc">• Persistence &amp; Data model</text>
  <text x="65" y="600" class="item item-arc">• All dev-tooling specifics</text>
  <text x="65" y="616" class="item item-arc">• Audit (48, 64)</text>
  <text x="65" y="632" class="item item-arc">• Application philosophy</text>
  <text x="65" y="648" class="item item-arc">• Testing methodology</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• Information Security (93)</text>
  <text x="370" y="568" class="item item-shared">• Capacity &amp; Performance (91)</text>
  <text x="370" y="584" class="item item-shared">• Monitoring &amp; Event (90)</text>
  <text x="370" y="600" class="item item-shared">• Release Management (92, 86-06)</text>
  <text x="370" y="616" class="item item-shared">• Deployment (92)</text>
  <text x="370" y="632" class="item item-shared">• Architecture Management (ARC-100)</text>
  <text x="370" y="648" class="item item-shared">• Software Dev &amp; Mgmt (80-89)</text>
  <text x="645" y="530" class="col-h col-h-std">ITIL 4 unique</text>
  <text x="645" y="552" class="item item-std">• Incident Management</text>
  <text x="645" y="568" class="item item-std">• Problem Management</text>
  <text x="645" y="584" class="item item-std">• Change Enablement</text>
  <text x="645" y="600" class="item item-std">• Service Desk</text>
  <text x="645" y="616" class="item item-std">• Service Catalogue</text>
  <text x="645" y="632" class="item item-std">• Service Continuity</text>
  <text x="645" y="648" class="item item-std">• IT Asset Mgmt</text>
  <text x="645" y="664" class="item item-std">• Supplier &amp; Strategy Mgmt</text>
  <text x="645" y="680" class="item item-std">• Workforce &amp; Talent Mgmt</text>
</svg>