<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs OWASP SAMM</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">Software Assurance Maturity Model (5 functions, 15 practices)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="510" cy="240" r="70" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="655" y="85" class="std-lbl">OWASP SAMM</text>
  <text x="655" y="102" class="count">15 practices</text>
  <line x1="685" y1="108" x2="559" y2="191" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">10 of 15 SAMM practices have ARC-100 coverage</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">67%</tspan> of OWASP SAMM topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">17%</tspan> of ARC-100 chapters map back to OWASP SAMM</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• Everything outside security:</text>
  <text x="65" y="568" class="item item-arc">  API contract, Wire shapes</text>
  <text x="65" y="584" class="item item-arc">  Identity bands (47, 65)</text>
  <text x="65" y="600" class="item item-arc">  Data, Migrations</text>
  <text x="65" y="616" class="item item-arc">  Testing modes (82, 83)</text>
  <text x="65" y="632" class="item item-arc">  Repository (86), CI (85)</text>
  <text x="65" y="648" class="item item-arc">  Versioning, Audit</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• Policy &amp; Compliance (94, 93-12)</text>
  <text x="370" y="568" class="item item-shared">• Security Requirements (93)</text>
  <text x="370" y="584" class="item item-shared">• Secure Architecture (93-01)</text>
  <text x="370" y="600" class="item item-shared">• Secure Build (93-08, 85)</text>
  <text x="370" y="616" class="item item-shared">• Secure Deployment (92)</text>
  <text x="370" y="632" class="item item-shared">• Security Testing (84)</text>
  <text x="370" y="648" class="item item-shared">• Defect Mgmt (95-01)</text>
  <text x="370" y="664" class="item item-shared">• Environment / Ops Mgmt (80, 90-92)</text>
  <text x="645" y="530" class="col-h col-h-std">OWASP SAMM unique</text>
  <text x="645" y="552" class="item item-std">• Strategy &amp; Metrics</text>
  <text x="645" y="568" class="item item-std">• Education &amp; Guidance</text>
  <text x="645" y="584" class="item item-std">• Threat Assessment</text>
  <text x="645" y="600" class="item item-std">• Architecture Assessment</text>
  <text x="645" y="616" class="item item-std">• Incident Management</text>
</svg>