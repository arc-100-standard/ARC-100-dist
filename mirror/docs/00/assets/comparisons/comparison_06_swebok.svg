<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs SWEBOK</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">IEEE Software Engineering Body of Knowledge (15 knowledge areas)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="560" cy="240" r="148" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="735" y="85" class="std-lbl">SWEBOK</text>
  <text x="735" y="102" class="count">15 KAs</text>
  <line x1="765" y1="108" x2="664" y2="136" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">~7 of 15 SWEBOK KAs find a substantive home in ARC-100</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">45%</tspan> of SWEBOK topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">50%</tspan> of ARC-100 chapters map back to SWEBOK</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• API contract detail (Book 42)</text>
  <text x="65" y="568" class="item item-arc">• Wire shapes (Book 62)</text>
  <text x="65" y="584" class="item item-arc">• Auth flows detail (47, 65)</text>
  <text x="65" y="600" class="item item-arc">• Audit (48, 64)</text>
  <text x="65" y="616" class="item item-arc">• Deployment topologies (92)</text>
  <text x="65" y="632" class="item item-arc">• Compliance (94)</text>
  <text x="65" y="648" class="item item-arc">• SCA (95)</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• Design (40, 60, 20 foundations)</text>
  <text x="370" y="568" class="item item-shared">• Construction (80, 81, 86)</text>
  <text x="370" y="584" class="item item-shared">• Testing (82, 83, 84)</text>
  <text x="370" y="600" class="item item-shared">• Maintenance (13, 66)</text>
  <text x="370" y="616" class="item item-shared">• Configuration Mgmt (86)</text>
  <text x="370" y="632" class="item item-shared">• Quality (93, 82)</text>
  <text x="370" y="648" class="item item-shared">• Engineering Process (13, 85)</text>
  <text x="645" y="530" class="col-h col-h-std">SWEBOK unique</text>
  <text x="645" y="552" class="item item-std">• Requirements engineering KA</text>
  <text x="645" y="568" class="item item-std">• Engineering Management KA</text>
  <text x="645" y="584" class="item item-std">• Engineering Models &amp; Methods</text>
  <text x="645" y="600" class="item item-std">• Professional Practice</text>
  <text x="645" y="616" class="item item-std">• Engineering Economics</text>
  <text x="645" y="632" class="item item-std">• Computing / Math / Eng Foundations</text>
</svg>