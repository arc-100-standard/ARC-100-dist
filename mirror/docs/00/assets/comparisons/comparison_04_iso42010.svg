<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs IEEE/ISO/IEC 42010</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">Meta-framework for architecture descriptions (structural)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="505" cy="240" r="38" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="640" y="85" class="std-lbl">IEEE/ISO/IEC 42010</text>
  <text x="640" y="102" class="count">meta-framework</text>
  <line x1="670" y1="108" x2="532" y2="213" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">ARC-100 conforms to ~70% of 42010's structural conventions</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">70%</tspan> of IEEE/ISO/IEC 42010 topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">10%</tspan> of ARC-100 chapters map back to IEEE/ISO/IEC 42010</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• All actual topic content</text>
  <text x="65" y="568" class="item item-arc">• Concrete book/chapter taxonomy</text>
  <text x="65" y="584" class="item item-arc">• Status lifecycle</text>
  <text x="65" y="600" class="item item-arc">• Master/version split</text>
  <text x="65" y="616" class="item item-arc">• Indexing &amp; numbering rules</text>
  <text x="65" y="632" class="item item-arc">• Agent-readable index format</text>
  <text x="65" y="648" class="item item-arc">• Every domain chapter</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• Architecture description shape</text>
  <text x="370" y="568" class="item item-shared">• Viewpoints as bands</text>
  <text x="370" y="584" class="item item-shared">• Views as chapters</text>
  <text x="370" y="600" class="item item-shared">• Concerns as book topics</text>
  <text x="370" y="616" class="item item-shared">• Glossary (00-02)</text>
  <text x="645" y="530" class="col-h col-h-std">IEEE/ISO/IEC 42010 unique</text>
  <text x="645" y="552" class="item item-std">• Explicit stakeholder catalog</text>
  <text x="645" y="568" class="item item-std">• Model kinds taxonomy</text>
  <text x="645" y="584" class="item item-std">• Correspondence rules</text>
  <text x="645" y="600" class="item item-std">• Viewpoint definition discipline</text>
  <text x="645" y="616" class="item item-std">• AD framework conformance</text>
</svg>