<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs arc42</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">Widely-used architecture documentation template (12 sections)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="480" cy="240" r="53" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="620" y="85" class="std-lbl">arc42</text>
  <text x="620" y="102" class="count">12 sections</text>
  <line x1="650" y1="108" x2="517" y2="203" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">9 of 12 arc42 sections find a home in ARC-100</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">75%</tspan> of arc42 topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">12%</tspan> of ARC-100 chapters map back to arc42</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• Client band (20-21)</text>
  <text x="65" y="568" class="item item-arc">• Data band (60-66)</text>
  <text x="65" y="584" class="item item-arc">• Tooling band (80-86)</text>
  <text x="65" y="600" class="item item-arc">• API contract detail (Book 42)</text>
  <text x="65" y="616" class="item item-arc">• Wire shapes (Book 62)</text>
  <text x="65" y="632" class="item item-arc">• Audit (48, 64)</text>
  <text x="65" y="648" class="item item-arc">• Compliance / SCA (94, 95)</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• Goals &amp; identity (01)</text>
  <text x="370" y="568" class="item item-shared">• ADRs (12)</text>
  <text x="370" y="584" class="item item-shared">• Building blocks (40-03)</text>
  <text x="370" y="600" class="item item-shared">• Runtime view (40-02, 41)</text>
  <text x="370" y="616" class="item item-shared">• Deployment view (92)</text>
  <text x="370" y="632" class="item item-shared">• Cross-cutting (93)</text>
  <text x="370" y="648" class="item item-shared">• Glossary (00-02, 10-01)</text>
  <text x="645" y="530" class="col-h col-h-std">arc42 unique</text>
  <text x="645" y="552" class="item item-std">• Context &amp; system boundary</text>
  <text x="645" y="568" class="item item-std">• Quality requirements (NFRs)</text>
  <text x="645" y="584" class="item item-std">• Risks &amp; technical debt</text>
  <text x="645" y="600" class="item item-std">• Quality scenarios</text>
</svg>