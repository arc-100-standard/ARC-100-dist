<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <style>
    .bg { fill: #f2f2f2; }
    .title { font: bold 22px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .subtitle { font: 13px -apple-system, Segoe UI, sans-serif; fill: #666; }
    .arc-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #1e40af; }
    .std-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #991b1b; }
    .count { font: 11px -apple-system, Segoe UI, sans-serif; fill: #555; }
    .pct-lbl { font: bold 14px -apple-system, Segoe UI, sans-serif; fill: #111; }
    .pct-val { font: 13px -apple-system, Segoe UI, sans-serif; fill: #333; }
    .col-h { font: bold 13px -apple-system, Segoe UI, sans-serif; }
    .col-h-arc { fill: #1e40af; }
    .col-h-shared { fill: #333; }
    .col-h-std { fill: #991b1b; }
    .item { font: 11px -apple-system, Segoe UI, sans-serif; }
    .item-arc { fill: #1e40af; }
    .item-shared { fill: #333; }
    .item-std { fill: #991b1b; }
    .arc-circ { fill: #2563eb; fill-opacity: 0.16; stroke: #1e40af; stroke-width: 2; }
    .std-circ { fill: #dc2626; fill-opacity: 0.16; stroke: #991b1b; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="900" height="720" class="bg"/>
  <text x="450" y="35" text-anchor="middle" class="title">ARC-100 vs C4 model</text>
  <text x="450" y="58" text-anchor="middle" class="subtitle">Structural decomposition only: System Context to Code (4 levels)</text>
  <circle cx="370" cy="240" r="160" class="arc-circ"/>
  <circle cx="490" cy="240" r="30" class="std-circ"/>
  <text x="220" y="85" class="arc-lbl">ARC-100</text>
  <text x="220" y="102" class="count">~110 chapters across 7 bands</text>
  <text x="630" y="85" class="std-lbl">C4 model</text>
  <text x="630" y="102" class="count">4 levels</text>
  <line x1="660" y1="108" x2="511" y2="219" stroke="#991b1b" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <text x="450" y="440" text-anchor="middle" class="pct-lbl">Overlap quantification</text>
  <text x="450" y="462" text-anchor="middle" class="pct-val">All 4 C4 levels are addressed in ARC-100 (conceptually)</text>
  <text x="450" y="482" text-anchor="middle" class="pct-val"><tspan font-weight="bold">100%</tspan> of C4 model topics map into ARC-100 &#160;&#160;|&#160;&#160; <tspan font-weight="bold">5%</tspan> of ARC-100 chapters map back to C4 model</text>
  <text x="65" y="530" class="col-h col-h-arc">ARC-100 unique</text>
  <text x="65" y="552" class="item item-arc">• Everything outside structural views:</text>
  <text x="65" y="568" class="item item-arc">  Security, Identity, Audit</text>
  <text x="65" y="584" class="item item-arc">  Wire shapes, API contract</text>
  <text x="65" y="600" class="item item-arc">  Testing, CI, Repository</text>
  <text x="65" y="616" class="item item-arc">  Operations, Compliance</text>
  <text x="65" y="632" class="item item-arc">  Application philosophy</text>
  <text x="65" y="648" class="item item-arc">  Versioning, Migrations</text>
  <text x="370" y="530" class="col-h col-h-shared">Shared</text>
  <text x="370" y="552" class="item item-shared">• System Context (01, 40-01)</text>
  <text x="370" y="568" class="item item-shared">• Container (40-03 Services)</text>
  <text x="370" y="584" class="item item-shared">• Component (40-03, 20-02)</text>
  <text x="370" y="600" class="item item-shared">• Code (80-03 Project Structure)</text>
  <text x="645" y="530" class="col-h col-h-std">C4 model unique</text>
  <text x="645" y="552" class="item item-std">• Explicit diagramming notation</text>
  <text x="645" y="568" class="item item-std">• Level-specific drawing rules</text>
  <text x="645" y="584" class="item item-std">• Modeling-tool conventions</text>
</svg>